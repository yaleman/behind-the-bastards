name: Update Dataset

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-dataset
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen

      - name: Update archive dataset
        run: uv run python scripts/archive_btb.py

      - name: Commit updated archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions-b2b@terminaloutcomes.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No archive changes to commit"
            exit 0
          fi
          git commit -m "Update podcast archive"
          git push origin HEAD:main
